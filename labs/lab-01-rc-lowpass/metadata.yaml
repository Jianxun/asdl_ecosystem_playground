id: lab-01-rc-lowpass
title: "RC Low-Pass Fundamentals"
concept: "first-order low-pass behavior"
difficulty: beginner
learning_objectives:
  - "Compute cutoff frequency and time constant for a first-order RC low-pass."
  - "Run AC and transient analyses from ASDL and extract key metrics."
  - "Explain bandwidth versus settling-speed tradeoffs when R and C change."
theory_checks:
  - metric: cutoff_frequency_hz
    expected: "f_c = 1 / (2*pi*R*C)"
    tolerance: "+-5%"
  - metric: time_constant_s
    expected: "tau = R*C"
    tolerance: "+-10%"
simulations:
  - name: ac_sweep
    varies: ["frequency"]
    demonstrates: "-3 dB cutoff behavior"
  - name: transient_step
    varies: ["time"]
    demonstrates: "63% settling behavior and RC speed tradeoff"
deliverables:
  - lab.md
  - asdl/tb.asdl
  - asdl/stimuli.asdl
  - scripts/postprocess.py
  - scripts/plot.py
  - figures/fig1_ac_response.png
  - figures/fig2_transient_step.png
