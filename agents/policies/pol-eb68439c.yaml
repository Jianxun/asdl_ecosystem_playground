id: pol-eb68439c
content: "ASDL module variables substitute into source parameters only when braced — use {VDD} not VDD for substitution to work."
detail: |
  ## Intent
  Use braced variable references in ASDL source parameter values to ensure substitution occurs.

  ## Why
  - `modules.tb.variables` values substitute correctly when referenced as `{VDD}` or `{VCM}`.
  - Unbraced symbols like `VDD` are emitted literally into the netlist and not substituted,
    producing incorrect simulation setup without a compile error.

  ## Rule
  Always use `{VARNAME}` syntax when referencing module variables in instance parameters:
  ```yaml
  instances:
    vdd: ana.vdc dc={VDD}   # correct — substituted
    vss: ana.vdc dc=VDD     # wrong — emitted literally
  ```

