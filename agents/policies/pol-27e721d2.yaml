id: pol-27e721d2
content: "Before validating complex methods on real circuits, first validate on a deterministic reference with known closed-form behavior."
detail: |
  ## Intent
  Before validating complex extraction methods on real circuits, validate on a deterministic
  reference with known closed-form behavior.

  ## Why
  - Separates method errors from circuit-model complexity.
  - Provides a reliable baseline for numerical accuracy checks.

  ## Rules
  - Build a minimal synthetic fixture first (e.g., ideal `gm`, `ro`, known capacitors).
  - Compare extracted metrics against theory (e.g., DC gain, pole, UGB).
  - Require agreement within a predefined tolerance before applying method to larger designs.

  ## Recommended Tolerance
  - Start with <= 2% relative error for gain-bandwidth and pole checks.
  - Tighten as fixture complexity is reduced.

