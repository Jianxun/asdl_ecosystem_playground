id: pol-9ce3e7e4
content: "Each lab must include a compact, repeatable analysis recipe: run commands, analysis commands, key formulas, and expected numerical checkpoints."
detail: |
  ## Intent
  Each lab should include a compact, repeatable analysis recipe for future agents.

  ## Why
  - Prevents loss of context between sessions.
  - Makes "rerun + verify" a one-command workflow.

  ## Rules
  - Store a short summary in lab folder with:
    - run command(s)
    - analysis command(s)
    - key formulas
    - expected numerical checkpoints
  - Keep path references explicit and run-relative.
  - Include at least one machine-readable metrics artifact per run.

  ## Recommended Artifacts
  - `metrics_*.json`
  - `plot_*.png`
  - `lab.md` with theory-simulation comparison section

