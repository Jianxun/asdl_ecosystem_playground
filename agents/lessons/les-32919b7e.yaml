id: les-32919b7e
content: "For Xyce DC saves, `save_op` must emit `.PRINT DC FORMAT=CSV N(*)`; omitting `DC` causes analysis/print type mismatch rejection."
detail: |
  ## Condition
  Authoring ASDL testbenches with DC operating point saves targeting the Xyce backend.

  ## Rule
  Ensure the emitted `.PRINT` statement includes the analysis type explicitly:
  ```
  .PRINT DC FORMAT=CSV N(*)   ← correct
  .PRINT FORMAT=CSV N(*)       ← rejected by Xyce
  ```
  If the `save_op` primitive does not emit the analysis keyword, use `sim.save sim_type=DC`
  instead.

  ## Error signature
  Xyce error: `Analysis type <A> and print type <B> are inconsistent`

