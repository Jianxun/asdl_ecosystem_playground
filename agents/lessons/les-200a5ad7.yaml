id: les-200a5ad7
content: "Use `sim.save sim_type=<analysis>` for saves in Xyce flows; `sim.save_dc` is not a valid primitive and fails compile."
detail: |
  ## Condition
  Authoring ASDL testbenches targeting the Xyce backend that require save directives.

  ## Rule
  Do not use `sim.save_dc`. Use the generic save primitive with explicit analysis type:
  ```yaml
  instances:
    save1: sim.save sim_type=DC signals='V(*)'
  ```

  ## Root Cause
  `sim.save_dc` is not defined in `libs_common/simulation.xyce.asdl`. The correct primitive
  is `sim.save` with `sim_type` parameter.

expires_when:
  condition: "sim.save_dc is defined as a valid primitive in libs_common simulation libraries"
  watch: "libs_common/simulation.ngspice.asdl"
