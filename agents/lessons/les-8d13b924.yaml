id: les-8d13b924
content: "Xyce source primitives in emitted netlists may not accept symbolic `dc` parameter values reliably — use numeric literals instead."
detail: |
  ## Condition
  Authoring ASDL sources (vdc, vac, idc, etc.) targeting the Xyce backend where the dc
  parameter value is derived from a module variable.

  ## Rule
  Prefer numeric literals over symbolic references for Xyce source dc values:
  ```yaml
  # Safer: numeric literal
  vdd: ana.vdc dc=3.3

  # Risky: symbolic reference may not resolve in emitted netlist
  vdd: ana.vdc dc={VDD}
  ```
  If symbolic references are needed, verify the emitted netlist manually to confirm
  correct substitution.

  ## Root Cause
  Xyce netlist parser may not accept all symbolic value forms depending on version and
  context; this is a simulator-side limitation, not an ASDL authoring error.

expires_when:
  condition: "Xyce version upgrade confirms symbolic dc values work reliably, or ASDL emitter resolves values to numeric before emission"
  watch: "config/backends.yaml"
  issue: null

